name: build
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  goreleaser-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true # zizmor: ignore[cache-poisoning]

      - name: Setup Snapcraft
        uses: samuelmeuli/action-snapcraft@fceeb3c308e76f3487e72ef608618de625fb7fe8 # v3.0.1

      - name: Create Snapcraft cache dirs
        run: |
          mkdir -pv "$HOME/.cache/snapcraft/download"
          mkdir -pv "$HOME/.cache/snapcraft/stage-packages"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: ~> 2
          args: release --clean --skip=publish --snapshot
